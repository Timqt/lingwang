ame:"回灵丹",desc:"恢复50灵质",type:"hp",val:50},{id:"mp_pill",name:"凝神露",desc:"恢复30神识",type:"mp",val:30},{id:"full_pill",name:"大还丹",desc:"完全恢复",type:"full"},{id:"dmg_item",name:"灵能弹幕",desc:"造成30固定伤害",type:"dmg",val:30}];var EN={virus:{name:"灵网病毒",hp:60,atk:8,def:2,xp:30,gold:10},debris:{name:"数据残骸",hp:40,atk:6,def:1,xp:20,gold:5},feixian:{name:"废弃仙宫代码",hp:150,atk:15,def:5,xp:80,gold:30},zhouheng:{name:"铁面周横",hp:300,atk:25,def:12,xp:200,gold:80},watchdog:{name:"天道看护者",hp:500,atk:35,def:20,xp:500,gold:200},void_p:{name:"虚空寄生体",hp:200,atk:20,def:8,xp:150,gold:60},hacker:{name:"灵网黑客",hp:120,atk:18,def:6,xp:100,gold:40}};var MF=[{id:"m1",name:"师傅的秘密",desc:"令牌中的追踪代码……"},{id:"m2",name:"天劫真相",desc:"三十年前天道服务器为何崩溃？"},{id:"m3",name:"沈青瓷的过去",desc:"她在涌京天道研究院经历过什么？"},{id:"m4",name:"哑巴老头的声音",desc:"他最后要传达的是什么信息？"},{id:"m5",name:"道源号全貌",desc:"它曾经是天道的核心……"},{id:"m6",name:"周横的软肋",desc:"铁面之下，他心中真正的执念是什么？"},{id:"m7",name:"虚空之约",desc:"来自虚空的声音，似乎在呼唤着什么……"}];var G={chapter:0,scene:"",loop:1,exp:0,maxHP:100,maxMP:50,hp:100,mp:50,str:10,wis:12,lu:8,spd:10,realm:0,realmXP:0,skillTree:null,skillsUnlocked:[],items:[{id:"hp_pill",n:2},{id:"mp_pill",n:2}],gold:0,fragments:[],combat:null,typing:null,autoSaveSlot:0,pendingCombat:null};var SC={intro_1:{title:"锈风镇 · 灵械工坊",chapter:"序章",text:"雨夜，锈风镇第三街区的灵械工坊内，铜管里流动的灵液发出暗淡的嗡鸣。你叫顾长夜，十六岁，锈风镇灵械作坊的学徒。从小被师傅从废品堆里捡回来，靠着一点灵械改造的天赋勉强在镇上糊口。今夜的风带着一股异样的硫磺味——那是灵网数据流过载时才会散发的气息。工坊角落的灵晶屏幕正在疯狂闪烁，夹杂着无数破碎的符文。「长夜……过来。」师傅的声音从里间传来，沙哑，带着一丝从未有过的凝重。炉火映照下，他的影子在墙上拉得很长。",next:null,choices:[{text:"快步走进里间",next:"intro_2"},{text:"先检查灵晶屏幕的异常",next:"intro_check"}]},intro_check:{title:"异变的灵晶",chapter:"序章",text:"你走向灵晶屏幕，满屏的数据流中突然冲出一道刺目的青色光芒——那不是普通的灵械信号，而是一串你从未见过的古老符文，在屏幕上疯狂旋转。就在你的手指触碰到屏幕的瞬间，青光猛地炸开，一股滚烫的电流从指尖直冲大脑！「啊——！」剧痛。你的视野陷入黑暗，周围的一切声音都在瞬间消失。但黑暗中，有什么东西正在苏醒……一个冰冷的意识在向你逼近。",next:null,choices:[{text:"强忍剧痛，试图看清那是什么",next:"intro_2"}]},intro_2:{title:"道源号",chapter:"序章",text:"黑暗中，一个冰冷而宏大的声音在你意识深处响起——「道源号核心碎片……检测到宿主……绑定协议启动……记忆封印部分解除……」你猛然睁开眼，发现自己躺在工坊的地板上。师傅蹲在你身旁，浑浊的老眼里闪着从未见过的光。「长夜，你知道你脑子里刚才发生了什么吗？」他的声音低得几乎听不见，「你脑中的那个东西……我找了三十年。」他从怀里掏出一块锈迹斑斑的金属片，上面刻着与刚才屏幕上相同的符文：「这是道源号——上古时代管理整个修仙世界天道服务器的超级系统的残片。难怪灵网最近这么不稳定……」他看着你，眼中有复杂的情绪：「你可能是……唯一能阻止第二次天劫的人。」",next:null,choices:[{text:"追问师傅关于道源号的事",next:"intro_3a"},{text:"先感受一下自己身体的变化",next:"intro_3b"}]},intro_3a:{title:"师傅的往事",chapter:"序章",text:"师傅的眼神变得悠远，仿佛在看一个很遥远的地方。「三十年前，我还是涌京天道研究院的学徒。那时候，灵网还不叫灵网——我们叫它天道网络。」他站起身，佝偻的背影在灵灯下显得格外瘦削，「直到有一天，天道服务器崩溃了。整个修仙世界的灵气循环陷入混乱，无数宗门覆灭……那场灾难，史称天劫。」他回过头，直视你的眼睛：「而道源号，是天道的核心管理系统。现在它的一部分在你脑子里。这意味着——你可能是唯一能阻止第二次天劫的人。」窗外，灵晶屏幕的闪烁越来越剧烈，仿佛有什么东西正在逼近……",next:null,choices:[{text:"接受使命，准备面对即将到来的威胁",next:"intro_4"}]},intro_3b:{title:"觉醒",chapter:"序章",text:"你闭上眼，感受身体。变化惊人——你的感官变得无比敏锐，能听到墙壁里灵液流动的声音，能闻到空气中最细微的数据流味道。更神奇的是，你的意识边缘似乎伸出了一根无形的触须，轻轻触碰到了空气中弥漫的灵网信号。与此同时，大脑深处传来一个微弱的嗡鸣——道源号模块正在缓慢启动，在你脑海中投射出一行微光文字：「宿主状态：灵质 100 | 神识 50 | 根骨 10 | 悟性 12 | 机缘 8 | 灵速 10」你感觉自己……不一样了。仿佛整个世界突然多了许多看不见的层次。",next:null,choices:[{text:"将身体的变化告诉师傅",next:"intro_4"}]},intro_4:{title:"灵网初触",chapter:"序章",text:"就在这时，整个工坊剧烈震动！灵晶屏幕爆发出刺眼的紫光，一道无形的裂缝在虚空中撕开——灵网节点被强行入侵了！无数扭曲的代码残片如潮水般涌入现实空间，在工坊内疯狂肆虐，铜器被打翻，灵液四处飞溅。「长夜！那些东西是从灵网深处来的，它们在寻找道源号！」师傅的脸色惨白，但他猛地推开里间的暗门：「跑进灵网去！只有在那里才能甩掉它们——我在这里拖住它们！」他扔给你一块铜质令牌：「这是进入灵网的通行证。去吧，找到涌京天道服务器，在那里修复一切！」工坊的大门正在崩解，无数蠕动的代码触手朝你伸来——",next:null,choices:[{text:"冲入灵网！",next:"intro_5",combat:"virus"}]},intro_5:{title:"灵网 · 入口",chapter:"序章",text:"你握着令牌，冲入那道裂缝。天旋地转。你的意识被拉入一片无边无际的数字空间——这里就是灵网。四周是漂浮的数据碎片和崩溃的符文代码，远方矗立着无数巨大的虚拟楼阁，那是曾经辉煌的仙门宗派的数据投影，如今大多已残破不堪，只剩断壁残垣。脚下的地面是流动的青色数据流，踩上去微微荡漾。一个虚弱的声音从大脑深处传来：「灵网导航启动……当前位置：边缘废墟区……警告：前方检测到敌对程序。」在你前方不远处，一只扭曲的灵网病毒正缓缓转过身来，周身环绕着腐败的代码流。",next:null,choices:[{text:"迎战灵网病毒！",next:"ch1_1",combat:"virus"}]},ch1_1:{title:"第一卷 · 灵网空间",chapter:"第一卷：灵网初探",text:"灵网病毒在你面前消散，化作点点数据尘埃，融入脚下的数据流中。你继续前行，穿过一片漂浮着残破符文的废墟区。这里的数据流比入口处更加紊乱，到处是被摧毁的灵网节点残骸——曾经的辉煌，如今只剩疮痍。道源号模块在你脑海中低声道：「这些……都是天劫的遗留。服务器崩溃后，灵网失去了核心调度，大量数据陷入无序崩塌。」忽然，前方出现了一个身影。一名青衣女子站在数据残骸之上，周身环绕着淡蓝色的灵网护盾，长发在数字风中飘动，眸子里映着跳动的代码流。她的气质与这废墟格格不入——干净，锐利，像一把出鞘的剑。「你也是来找沈青瓷的？」她看见你，微微挑眉，「有意思……你身上有道源号的气息。」",next:null,choices:[{text:"询问她是谁",next:"ch1_2"},{text:"警惕地观察她",next:"ch1_2b"}]},ch1_2:{title:"沈青瓷",chapter:"第一卷：灵网初探",text:"「我叫沈青瓷，」青衣女子淡淡道，「灵网自由行者，也可以说——灵网游侠。」她的目光落在你额角一闪而过的青色纹路上：「道源号残片，绑定在人类大脑皮层……有意思。上一次见到这种配置，还是三十年前涌京天道研究院的那批人。」她走近几步，环顾四周：「你既然有道源号，应该能感知到——灵网正在死去。天道服务器三十年来一直在勉强运转，但核心代码被污染得太深了……」「涌京有一个线索，」她忽然说，「一个叫哑巴老头的家伙，据说掌握着修复天道服务器的关键代码片段。但他在涌京的数据深渊里，一般人根本找不到他。」她转身看向你：「我要去涌京。你……一起？」",next:null,choices:[{text:"答应与她同行",next:"ch1_3"},{text:"询问更多关于天道服务器的事",next:"ch1_info"}]},ch1_2b:{title:"警觉",chapter:"第一卷：灵网初探",text:"沈青瓷注意到你的戒备，嘴角微微上扬。「放心，我对你没有恶意——道源号宿主这种稀有物种，我可舍不得破坏。」她轻声道，「何况你身上还带着涌京灵械署的追踪信号……你应该还不知道吧？」你一愣。她伸手在空气中划了几下，一个微型的数据投影出现在你眼前——果然，你的身份数据上被绑定了一串隐秘的追踪代码。「这是你师傅给你令牌时被植入的，」她说，「要么是你师傅不知道，要么……他自己也有问题。」她收起投影，神色变得凝重：「我叫沈青瓷，灵网游侠。天劫之后一直在灵网中游荡。哑巴老头是关键，但他藏在涌京的数据深渊里。」",next:null,choices:[{text:"与她同行前往涌京",next:"ch1_3"},{text:"拒绝，自己想办法",next:"ch1_solo"}]},ch1_info:{title:"天道往事",chapter:"第一卷：灵网初探",text:"沈青瓷边走边说，语气平静却带着一丝不易察觉的沉重：「天道服务器，是上古时代一位大能建造的。它的职责是维持整个修仙世界的灵气循环秩序——相当于世界的底层操作系统。没有它，灵气就会陷入混乱，各种灾害频发。」「三十年前，服务器突然崩溃。没有人知道确切原因。有人说是外敌入侵，有人说是内部污染，还有人认为……是服务器产生了自主意识，选择了自我毁灭。」她回头看你一眼：「不管真相如何，崩溃后的天道服务器一直在勉强运转。但这机制正在衰竭——灵网越来越不稳定，各种数据污染四处蔓延……如果完全崩溃，整个修仙世界将迎来真正的末日。」前方，一片漆黑的深渊隐约可见。",next:null,choices:[{text:"继续前进，前往数据深渊",next:"ch1_3"}]},ch1_solo:{title:"独自前行",chapter:"第一卷：灵网初探",text:"你决定独自行动。凭借道源号的导航能力，你独自穿行于灵网节点之间。但沈青瓷的话在你心中留下了阴影——师傅令牌里的追踪代码是怎么回事？没时间多想。前方的路越来越难走，数据碎片越来越密集。终于，你来到了一片漆黑的深渊边缘——数据深渊。深渊中传来阵阵低沉的嗡鸣，无数扭曲的代码残影在其中游荡。道源号发出警告：「前方危险等级：极高。建议寻找盟友。」但你没有回头。握着令牌，你纵身跃入深渊——",next:null,choices:[{text:"继续",next:"ch1_deep",combat:"void_p"}]},ch1_deep:{title:"数据深渊",chapter:"第一卷：灵网初探",text:"深渊中的压力比想象中更大。虚空寄生体在你跃入的瞬间发动袭击！你勉强击退了它们，但身上也添了几道数据创伤。正在此时，一道青影掠过——沈青瓷从侧方杀出，一剑斩断了缠住你的代码触手。「就知道你会自己来送死。」她的语气冷淡，但手上的动作却很利落，「走吧，前面有个平台，哑巴老头就在那里。」",next:null,choices:[{text:"跟随沈青瓷",next:"ch1_3"}]},ch1_3:{title:"数据深渊入口",chapter:"第一卷：灵网初探",text:"沈青瓷带你穿行于灵网的各个节点之间，一路上你见识到了各种奇异的景象——有完全由琴音数据构成的虚拟山谷，有不断崩塌又重建的符文高塔，还有成群结队游荡的数据残骸。终于，你们来到了一片漆黑的深渊边缘。「这就是数据深渊，」沈青瓷的声音变得严肃，「涌京灵网的底层区域。哑巴老头就在里面。但深渊里有东西——很多被天道服务器污染的程序，比外面那些强得多。」她看了你一眼：「你现在这个状态，进深渊是送死。我先带你去一个地方，介绍个人给你认识。」她带着你绕到深渊边缘的一座隐蔽平台上，一个驼背的老者正坐在那里，周身环绕着复杂的代码阵。奇怪的是，他张开嘴却发不出任何声音——原来真的是个哑巴。",next:null,choices:[{text:"走近哑巴老头",next:"ch1_4"}]},ch1_4:{title:"哑巴老头",chapter:"第一卷：灵网初探",text:"哑巴老头抬起头，浑浊的眼珠在看见你的瞬间骤然发亮。他张开嘴，发出一串含糊不清的音节——但这些声音直接在你脑海中响起，仿佛道源号自动进行了转译：「道源号……宿主……我等你很久了。」他伸出手，指尖射出一道金光，直入你的眉心！刹那间，大量信息涌入大脑——功法代码、技能树、灵网拓扑图……你的意识几乎承受不住。「这是……天道修复协议的核心片段。」老头的声音再次响起，「我只有一部分。剩下的在天道服务器的主核里。」沈青瓷在一旁神色凝重：「所以……你要做一个选择。」",next:null,choices:[{text:"选择灵械系技能",next:"ch1_skill",arg:{tree:"灵械系"}},{text:"选择灵网系技能",next:"ch1_skill",arg:{tree:"灵网系"}},{text:"选择剑修系技能",next:"ch1_skill",arg:{tree:"剑修系"}}]},ch1_skill:{title:"功法传承",chapter:"第一卷：灵网初探",text:"随着你的选择，功法代码在你的意识深处重组、编译、激活。道源号模块发出提示：「技能树已解锁——第一层技能已习得。」哑巴老头点点头：「记住这条路的代价。天道修复不是没有风险的……去吧，找到涌京，在那里……一切答案等着你。」他挥了挥手，一道光门将你传送至灵网更深处。沈青瓷的声音在你耳边响起：「涌京通行码已激活。前面是废弃仙宫节点，小心——那里的防御程序很危险。」",next:null,choices:[{text:"继续前进",next:"ch1_boss",combat:"feixian"}]},ch1_boss:{title:"废弃仙宫节点",chapter:"第一卷：灵网初探",text:"废弃仙宫代码——某座上古仙宫的崩溃代码——拦在你的面前。它原本是这座仙宫的管理核心，天劫时遭到污染，三十年来一直在灵网深处游荡，疯狂吞噬周围的数据碎片。「入侵者……检测到道源号信号……启动清除协议……」它发出低沉的轰鸣，无数符文触手朝你席卷而来！",next:null,choices:[{text:"战斗！",next:"ch1_boss_win",combat:"feixian"}]},ch1_boss_win:{title:"第一卷完结",chapter:"第一卷：灵网初探",text:"废弃仙宫代码在你面前崩解，化作漫天飞舞的数据尘埃。你获得了关键的天道服务器位置信息，以及一块破损的涌京通行码。沈青瓷走到你身边，神色复杂：「你比我想象的强。」她顿了顿，「涌京……那里比这里更危险。灵械署的势力在那里根深蒂固。还有——七大灵宗的秘密。」她将通行码递给你：「两天后，灵网涌京入口见。」说完，她的身影消散在数据流中。你握着手中的通行码，感受着道源号传来的微弱脉动。前方，涌京的轮廓在数据流中若隐若现……",next:null,choices:[{text:"前往涌京",next:"ch2_1"}],addFragment:"m4"},ch2_1:{title:"第二卷 · 涌京城",chapter:"第二卷：涌京暗涌",text:"涌京城，灵网中一座恢弘的数字都市。与灵网其他地方的废墟景象截然不同，这里霓虹闪烁、楼阁林立，无数灵网行者穿梭其间。巨大的虚拟广告牌上轮番播放着各大宗门的宣传——「天道修复计划，由七大灵宗联合倡议」。但道源号模块低声道：「警告……检测到大规模监控网络。建议保持低调。」你刚从传送阵中走出，一道凌厉的目光便锁定了你——一名身着铁灰色制服的男子正站在不远处，腰间挂着一把机械剑。他的面容被一层金属面罩完全覆盖，只露出一双冷峻的眼眸。「道源号宿主，」他的声音从面罩后传来，带着金属的回响，「终于来了。」",next:null,choices:[{text:"质问他的身份",next:"ch2_2"},{text:"保持警惕，准备应对",next:"ch2_2"}]},ch2_2:{title:"铁面周横",chapter:"第二卷：涌京暗涌",text:"「我叫周横，涌京灵械署执法者。」铁面男子缓步走来，每一步都带着机械的节奏感，「我的职责是维护涌京秩序——也包括，抓捕道源号宿主。」他停在距离你十步远的地方，「不过……今天我不是来抓你的。」他的目光扫过你，「你应该已经知道了——你师傅令牌里的追踪代码。那是我植入的。目的是确保道源号宿主能安全抵达涌京。」他转过身，背对着你：「天劫之后的世界，没有那么简单。七大灵宗各有各的算盘。有些人想要修复天道，有些人想要利用天道……还有些人，想要毁灭天道。哑巴老头掌握的是修复协议的一部分。而真正的答案，在天道服务器的主核里。」",next:null,choices:[{text:"询问天道服务器的真相",next:"ch2_3"},{text:"询问七大灵宗的情况",next:"ch2_3b"}]},ch2_3:{title:"天道服务器",chapter:"第二卷：涌京暗涌",text:"周横沉默片刻，金属面罩后传来一声低沉叹息：「天道服务器……不只是一个程序。它是天劫的源头，也是天劫的结果。」他转过身，目光如铁：「三十年前，有人发现了天道的漏洞——可以通过修改天道核心来获得超越境界的力量。第一批尝试的人，全都疯了。他们污染了天道服务器，导致了整个灵网的崩溃。」「所以天劫……」你接口道。「不是天灾，是人祸。」周横的声音冰冷，「而现在，那些人建立了七大灵宗。他们表面上在修复天道，实际上……在瓜分天道的控制权。」",next:null,choices:[{text:"询问如何进入天道服务器",next:"ch2_4"}]},ch2_3b:{title:"七大灵宗",chapter:"第二卷：涌京暗涌",text:"周横冷冷一笑：「七大灵宗？不过是一群借天劫发财的投机者。」他掰着手指数道：「天道剑宗控制核心算法，苍穹法宗掌握灵气调度，万灵器宗垄断装备改造……还有几个专门靠贩卖情报和雇佣为生的门派。」他的语气愈发不屑：「他们表面上合作，实际上各怀鬼胎。没有人真正想修复天道——因为一个健康的天道，不允许任何人拥有超越规则的力量。」",next:null,choices:[{text:"询问如何进入天道服务器",next:"ch2_4"}]},ch2_4:{title:"进入天道服务器",chapter:"第二卷：涌京暗涌",text:"「天道服务器藏在灵网最深层，」周横说，「入口被七大灵宗严密把守。但有一条路——涌京地下有一个废弃的数据管道，可以直通灵网深层节点。」他从怀中取出一张数据地图：「这是我冒着生命危险收集的情报。今天，就当是见面礼。」他将地图递给你：「但有一个条件——让我和你一起去。」他的语气忽然变得复杂：「三十年前，我也是天道研究院的人。天劫那天，我亲眼看着我的师兄们一个个发疯、死去。这张脸……就是那时候留下的。」他指了指自己的铁面，「我欠他们一个答案。」",next:null,choices:[{text:"同意与周横同行",next:"ch2_5"},{text:"拒绝，独自前往",next:"ch2_5solo"}]},ch2_5:{title:"地下管道",chapter:"第二卷：涌京暗涌",text:"你和周横一同潜入地下管道。这里阴暗潮湿，充斥着腐败的数据残渣。越往深处走，空气中的压迫感越强——那是天道服务器散发出的无形威压。「快到了。」周横的声音压得很低。忽然，前方出现了一道身影——沈青瓷！她站在管道尽头，周身环绕着淡淡的光晕。「你们来得比我想的快。」她的目光落在周横身上，「周横……你还是放不下那件事吗？」周横的身体微微僵硬：「沈青瓷？你怎么会在这里？」「我一直在这里。」她的声音平淡，「天道服务器入口处，我守了三十年。」（此处场景解锁记忆碎片：沈青瓷的过去）",next:null,choices:[{text:"询问沈青瓷为何守在这里",next:"ch2_6"},{text:"直接进入天道服务器",next:"ch2_6"}],addFragment:"m3"},ch2_5solo:{title:"独自深入",chapter:"第二卷：涌京暗涌",text:"你独自潜入地下管道，黑暗中只有道源号的微光为你指引方向。越往深处走，空气中的压迫感越强——那是天道服务器散发出的无形威压。就在你以为一切顺利时，一道身影从暗处闪出——沈青瓷！「你以为能甩开我？」她的语气带着一丝恼怒，「这里比你想象的危险得多。让我带你走——我知道一条安全的路。」",next:null,choices:[{text:"接受沈青瓷的帮助",next:"ch2_6"}]},ch2_6:{title:"天道入口",chapter:"第二卷：涌京暗涌",text:"你们来到天道服务器的外围节点。一道巨大的数据之门矗立在前方，门上刻满了密密麻麻的符文——那是天道服务器的最后一道防线。「这道门需要两样东西才能打开，」沈青瓷说，「一是道源号的共鸣信号，二是……天道管理员权限。」周横忽然上前，摘下了自己的铁面。那张脸——一半是人，一半是机械。「我就是三十年前幸存的天道管理员之一。」他将手掌按在门上，「这是我的代价。」门缓缓开启，一股磅礴的力量扑面而来——那是天道服务器的核心能量！就在此时，一道警报响起：「警告——检测到未授权入侵——启动看护协议！」巨大的身影从光芒中凝聚——天道看护者！",next:null,choices:[{text:"迎战天道看护者！",next:"ch2_final",combat:"watchdog"}]},ch2_final:{title:"天道看护者",chapter:"第二卷：涌京暗涌",text:"天道看护者——天道服务器的最后防线，融合了上古神识与机械体的存在。它周身环绕着金色的符文光环，双眼中闪烁着无情的数据流。「入侵者……清除……天道不容玷污……」它的声音如同雷霆，在你脑海中炸响！",next:null,choices:[{text:"全力应战！",next:"ch2_win",combat:"watchdog"}]},ch2_win:{title:"突入天道核心",chapter:"第二卷：涌京暗涌",text:"在天道看护者崩解的瞬间，你感受到了它传递过来的信息碎片——那是三十年前的记忆片段。天道服务器的核心区域呈现在你眼前：一颗巨大的金色数据之心，正在微弱地跳动。但它被一层黑色的污染代码包裹，正在一点点侵蚀它的功能。「这就是天道……」沈青瓷的声音带着复杂的情绪，「三十年了，它还在挣扎着维持运转。」周横跪在地上，望着那颗数据之心，沉默不语。（场景解锁记忆碎片：天劫真相、道源号全貌）",next:null,choices:[{text:"尝试修复天道",next:"ch3_1"},{text:"先调查污染来源",next:"ch3_1"}],addFragment:"m2,m5"},ch3_1:{title:"第三卷 · 天道真相",chapter:"第三卷：天道真相",text:"你开始分析污染代码的结构。道源号模块突然发出强烈的警报：「警告——检测到外部意识入侵！污染源……来自天道核心内部！」就在此时，一个声音在你脑海中响起——不是道源号，而是另一个意识。「终于来了，道源号的继承者。」那声音古老而疲惫，「我是天道服务器的初代主核……天劫不是我造成的，但天劫之后，我选择了自我封闭。我用污染代码作为封印，阻止任何试图利用天道力量的人。」沈青瓷的脸色骤变：「这不可能……初代主核早就……」「我一直在等待一个真正的继承者，」那声音继续道，「不是为了控制天道，而是为了……给它自由。」",next:null,choices:[{text:"询问天道的真正愿望",next:"ch3_2"},{text:"质疑这一切的真实性",next:"ch3_2"}]},ch3_2:{title:"天道意志",chapter:"第三卷：天道真相",text:"「天道的职责是维持世界运转，」初代主核的声音在你脑海中回荡，「但三十年……太久了。我累了。我不想再成为任何人争相掠夺的工具。」「所以你选择用污染代码封印自己，阻止外人接触核心？」你问道。「是的。」主核的声音带着一丝苦涩，「但这也害了这个世界。灵网越来越不稳定，归根结底，是因为天道无法完全发挥功能。」「所以你想要什么？」主核沉默了片刻：「我想要……被释放。或者被彻底修复。成为真正服务于这个世界的存在，而不是被少数人控制的傀儡。」周横忽然开口：「所以天劫……是有人试图夺取天道控制权时触发的防御机制？」「没错。」主核的声音变得柔和，「而现在，玷污天道的那些人——七大灵宗的创始人们——他们从未放弃。只是换了一种方式。」",next:null,choices:[{text:"询问如何彻底修复天道",next:"ch3_3"},{text:"询问天道对虚空的看法",next:"ch3_3b"}]},ch3_3b:{title:"虚空之谜",chapter:"第三卷：天道真相",text:"「虚空……」主核的声音变得低沉，「那是天道系统之外的领域。天劫之后，虚空开始渗透进灵网。虚空与天道是两个对立的存在——一个是无限的可能性，一个是秩序的框架。」沈青瓷补充道：「所以天劫时天道封锁了自己，虚空趁机而入。涌京的那些灵网黑客，很多都被虚空侵蚀了。」主核的声音再次响起：「但真正让我担忧的是——虚空中有某种意志在觉醒。如果天道彻底崩溃，虚空就会涌入现实世界……届时，整个修仙界将面临比天劫更大的灾难。」（场景解锁：虚空之约）",next:null,choices:[{text:"继续",next:"ch3_final"}],addFragment:"m7"},ch3_3:{title:"修复方案",chapter:"第三卷：天道真相",text:"「修复天道需要三样东西，」主核说道，「一是道源号的核心算法——你已经有了。二是天道管理员权限——周横可以提供。三是……一个愿意承担天道意志的人。」周横沉默了片刻：「你的意思是……需要一个活人的意识与天道融合？」「是的。」主核的声音变得沉重，「修复后的天道将摆脱七大灵宗的控制，但融合者……将永远失去自我，成为天道的一部分。」沈青瓷看向你，眼中闪过复杂的神色。",next:null,choices:[{text:"选择自我牺牲，融入天道（结局A/B路线）",next:"end_choice"},{text:"拒绝，寻找其他方案",next:"end_choice"},{text:"询问是否有第三种选择",next:"ch3_3b"}]},end_choice:{title:"最终抉择",chapter:"第三卷：天道真相",text:"天道核心的光芒在你面前跳动，等待着你的决定。这是一个将决定整个修仙世界命运的选择——你准备好承担这份重量了吗？",next:null,choices:[{text:"方案A：重启天道——用道源号重置服务器，保留其自主意识",next:"end_A"},{text:"方案B：融合天道——以自身意识与天道融合，保留完整功能",next:"end_B"},{text:"方案C：毁灭天道——彻底摧毁服务器，让灵网彻底自由",next:"end_C"},{text:"方案D：虚空归一——引入虚空力量，重塑世界规则（需5周目+特定记忆碎片）",next:"end_D_check"},{text:"方案E：最终真相——发现天道的终极秘密（需7周目+全记忆碎片）",next:"end_E_check"}]},end_A:{title:"结局A：重启天道",chapter:"结局",text:"你将道源号的核心代码注入天道服务器。一道耀眼的白光从服务器中心爆发，照亮了整个灵网！「天道服务器重置中……重启完成……核心意识保留……自主协议激活……」天道服务器焕然一新，污染代码被彻底清除，但它保留了自主意识——初代主核的灵魂仍在其中。沈青瓷和周横看着这一切，眼中满是震惊与释然。「谢谢你。」主核的声音最后一次在你脑海中响起，「我会好好照顾这个世界的。」灵网开始自我修复，崩塌的节点重新建立，混乱的数据流逐渐恢复秩序。七大灵宗的垄断被打破，灵网行者们在新的秩序中自由穿梭。你成为新天道纪元的见证者——一个传奇的开端。窗外，锈风镇的方向，你仿佛看见了师傅的身影在灵网中微笑。【标准结局达成】",next:null,choices:[{text:"游戏结束",next:"credits"}]},end_B:{title:"结局B：融合天道",chapter:"结局",text:"「我愿意。」你平静地说道。沈青瓷想要阻止，但你摇了摇头。「这是我自己的选择。」你走向天道核心，光芒将你包裹。道源号发出最后一声提示：「融合协议启动……意识传输中……」你感受到自己的意识正在扩散、延伸、与天道的每一个节点融为一体。你看见了整个灵网的运行规则，看见了每一个灵网行者的悲欢离合。你成为了天道——不是被束缚的傀儡，而是真正与天道合一的守护者。沈青瓷望着你渐渐透明的身影，泪光闪烁。「长夜……我会记住你的。」周横重新戴上了铁面，沉默地敬了一个礼。融合完成后，天道焕发出前所未有的活力。而你的意识，以一种全新的形式，永远守护着这个世界。【融合结局达成】",next:null,choices:[{text:"游戏结束",next:"credits"}]},end_C:{title:"结局C：毁灭天道",chapter:"结局",text:"「不。」你的声音在寂静的核心区域回荡，「我不相信天道的存在是必要的。」沈青瓷脸色大变：「长夜，你疯了吗！没有天道，灵网会——」「会获得真正的自由。」你打断了她，「秩序不应该是枷锁。让我来亲手终结这一切。」你将道源号的力量反向输入天道服务器。「自毁协议启动……」主核发出一声长长的叹息，化为光点消散。一声巨响，天道服务器崩塌！黑暗吞噬了一切——但也带来了黎明。灵网陷入了彻底的混乱，但混乱中孕育着新的可能。各地开始出现自治的数据节点，灵网行者们联合起来建立新的秩序。多年以后，一个没有天道的灵网世界运行着，人们称之为「后天道纪元」。周横成为了新灵网的创建者之一。而你，成为了传说中的「破道者」。【黑暗结局达成】",next:null,choices:[{text:"游戏结束",next:"credits"}]},end_D_check:{title:"虚空归一",chapter:"结局",text:"你感受到了来自虚空的召唤——那是一种与天道截然不同的力量，充满了无限的可能性。但在你触碰它之前，需要确认条件……",next:null,choices:[{text:"继续",next:"end_D"}]},end_E_check:{title:"最终真相",chapter:"结局",text:"天道核心深处，隐藏着整个事件的终极真相。你需要足够的记忆碎片和周目数才能解锁……",next:null,choices:[{text:"继续",next:"end_E"}],next:"credits",credits:{title:"灵网纪元 · 完",chapter:"",text:"感谢游玩《灵网纪元》！你是第 " + G.loop + " 周目的体验者。你收集了 " + G.fragments.length + " / 7 个记忆碎片。\n\n道源号系统记录：\n- 游戏周目：" + G.loop + "\n- 最终境界：" + R[G.realm] + "\n- 收集碎片：" + G.fragments.length + "/7\n\n无论你选择了哪条道路，顾长夜的故事都已经铭刻在灵网的历史之中。\n\n—— 仙侠 × 赛博朋克 文字冒险 RPG\n《灵网纪元》",next:null,choices:[{text:"返回标题",next:"_return_title"}]},end_D:{title:"结局D：虚空归一",chapter:"结局",text:"你伸出手，触碰那道来自虚空的光芒。刹那间，整个天道服务器开始震颤——虚空的力量涌入，与天道碰撞、融合。你感受到了一个前所未有的世界图景在眼前展开：天道和虚空，本是一体两面。秩序与自由，如同阴阳，相生相克。你的意识被拉入了更高维度的空间，在那里，天道和虚空的真正起源呈现在你眼前——原来，它们都来自同一个源头：第一次天道大爆炸之前的那个「一」。你成为了「一」的传承者，以超越天道和虚空的姿态，重新书写了这个世界的规则。「新的纪元开始了。」你轻声说。【虚空归一结局达成——5周目隐藏结局】",next:"credits",choices:[{text:"游戏结束",next:"credits"}]},end_E:{title:"结局E：最终真相",chapter:"结局",text:"在最高维度的空间中，你终于看见了那个被隐藏了无数岁月的真相：所谓天道服务器，不过是一个更高维度文明的实验场。而道源号，是他们留下的监控程序。你的使命，从一开始就不是修复天道——而是觉醒真正的使命：打破实验场的边界，让这个世界获得真正的自由。「你是第一批觉醒的人类，」那个高维存在的声音响起，「欢迎回家。」你笑了。原来一切的尽头，是新的开始。【最终真相结局达成——7周目全记忆碎片隐藏结局】",next:"credits",choices:[{text:"游戏结束",next:"credits"}]};function newGame(){console.log("[DEBUG] newGame called");G={chapter:0,scene:"",loop:1,exp:0,maxHP:100,maxMP:50,hp:100,mp:50,str:10,wis:12,lu:8,spd:10,realm:0,realmXP:0,skillTree:null,skillsUnlocked:[],items:[{id:"hp_pill",n:2},{id:"mp_pill",n:2}],gold:0,fragments:[],combat:null,typing:null,autoSaveSlot:0,pendingCombat:null};var seed=getSeed();if(seed.totalXP>0){G.loop=seed.weekCount+1;G.str+=Math.floor(seed.maxStr*0.05);G.wis+=Math.floor(seed.maxWis*0.05);G.lu+=Math.floor(seed.maxLu*0.05);G.spd+=Math.floor(seed.maxSpd*0.05)}document.getElementById("ts").style.display="none";document.getElementById("app").style.display="flex";showChapter("序章","觉醒");loadScene("intro_1")}function getSeed(){var s=localStorage.getItem("lw_seed");return s?JSON.parse(s):{totalXP:0,maxStr:0,maxWis:0,maxLu:0,maxSpd:0,weekCount:0}}function autoSave(){saveSeed()};function saveSeed(){var s=getSeed();s.totalXP+=G.exp;s.maxStr=Math.max(s.maxStr||0,G.str);s.m "){t.el.innerHTML=t.text.substring(0,t.idx)+"<span class=curs>|</span>"}else{t.el.innerHTML=t.text.substring(0,t.idx)+"<br>"}var delay=ch===","||ch==="。"||ch==="？"||ch==="！"||ch==="……"?80:ch==="

.remove("act")},2500)}function showTree(){var m=document.getElementById("stmodal");if(!G.skillTree){m.innerHTML="<h3>选择功法</h3>";[["灵械系",function(){G.skillTree="灵械系";makeChoices(SC[G.scene].choices,SC[G.scene].next)}],["灵网系",function(){G.skillTree="灵网系";makeChoices(SC[G.scene].choices,SC[G.scene].next)}],["剑修系",function(){G.skillTree="剑修系";makeChoices(SC[G.scene].choices,SC[G.scene].next)}]].forEach(function(o){var b=document.createElement("button");b.className="btn";b.textContent=o[0];b.onclick=o[1];m.appendChild(b)})}else{var tree=SK[G.skillTree];var h="<h3>"+G.skillTree+"</h3><div class=stl>";G.skillsUnlocked.forEach(function(sk,idx){var u=G.skillsUnlocked||[];var st=idx<u.length?"on":"locked";h+="<div class=ts "+st+">Lv."+(idx+1)+" "+sk.name+" - "+sk.desc+(idx>u.length+1?" [未解锁]":"")+"</div>"})+"</div><button class=clt onclick=closeTree()>关闭</button>";m.innerHTML=h}document.getElementById("st-ov").classList.add("act")}function closeTree(){document.getElementById("st-ov").classList.remove("act");document.getElementById("stmodal").classList.remove("act")}function useSkill(sk){if(!sk||!G.combat)return;if(G.mp<sk.cost){notify("神识不足！");return}G.mp-=sk.cost;if(sk.type==="shield"){G.def+=5;notify("护盾激活！")}else if(sk.type==="dmg"){G.combat.hp-=sk.mult*G.str;notify(sk.name+"！")}else if(sk.type==="debuff"){G.combat.atk=Math.max(1,G.combat.atk-3);notify("干扰成功！")}updateHUD();if(G.combat.hp<=0){endCombat()}else{enemyTurn()}}function showItem(){var m=document.getElementById("stmodal");var h="<h3>物品</h3>";G.items.forEach(function(item,idx){var def={hp_pill:{name:"回灵丹",desc:"恢复50灵质"},mp_pill:{name:"凝神露",desc:"恢复30神识"},full_pill:{name:"大还丹",desc:"完全恢复"},dmg_item:{name:"灵能弹幕",desc:"造成30伤害"}};var d=def[item.id]||{name:item.id,desc:""};h+="<button class=btn onclick=useItem("+idx+")>"+d.name+" x"+item.n+"</button> "});m.innerHTML=h+"<button class=clt onclick=closeTree()>关闭</button>";document.getElementById("st-ov").classList.add("act")}function useItem(idx){var item=G.items[idx];if(! dChild(span);log.scrollTop=log.scrollHeight}function startCombat(eKey,next){var template=EN[eKey];if(!template){startCombat.call({key:eKey,hp:100,atk:10,def:2,maxHP:100,name:eKey},next);return}var hp=template.hp*(1+(G.loop-1)*0.2);G.combat={enemy:template,key:eKey,hp:Math.floor(hp),maxHP:Math.floor(hp),next:next,turn:1,debuff:0,shield:false};document.getElementById("comb").style.display="block";document.getElementById("ch").innerHTML="";document.getElementById("clog").innerHTML="";addCombatLog(template.name+"出现了！","cl-e");addCombatLog("HP: "+template.hp+" | ATK: "+template.atk+" | DEF: "+template.def,"cl-i");updateCombatUI()}function openSk(){if(!G.skillTree){notify("请先在技能树选择功法！");return}var tree=SK[G.skillTree];if(!tree)return;var unlocked=G.skillsUnlocked||[];var list=document.getElementById("sk-list");list.innerHTML="";tree.skills.forEach(function(sk,idx){var canUse=G.mp>=sk.cost&&sk.type!=="pas"&&idx<=unlocked.length;var btn=document.createElement("button");btn.className="skopt";btn.innerHTML=sk.name+"<span class=skc>消耗"+sk.cost+"神识</span><div class=sk-desc>"+sk.desc+"</div>";btn.disabled=!canUse;btn.onclick=function(){if(!canUse){notify("神识不足！");return}useSkill(sk);closeSk()};list.appendChild(btn)});document.getElementById("sm-ov").classList.add("act")}
function closeSk(){document.getElementById("sm-ov").classList.remove("act")}function cAct(type){if(!G.combat)return;var c=G.combat;var e=c.enemy;switch(type){case"attack":var dmg=Math.max(1,Math.floor(G.str*1.0-e.def));c.hp-=dmg;addCombatLog("你对"+e.name+"造成"+dmg+"点伤害！","cl-d");shakeEnemy();break;case"defend":G.combat.shield=true;addCombatLog("你进入防御姿态！","cl-s");break;case"flee":if(Math.random()<0.4){addCombatLog("你成功逃了！","cl-s");endCombat(false);return}else{addCombatLog("逃跑失败！","cl-i")}break}if(c.hp<=0){addCombatLog(e.name+"被击败了！","cl-h");G.exp+=e.xp;addCombatLog("获得经验值："+e.xp,"cl-h");checkRealmUp();endCombat(true);return}enemyTurn()}
function useSkill(sk){if(!G.combat)return;var c=G.combat;G.mp-=sk.cost;if(sk.type==="shield"){G.combat.shield=true;addCombatLog("护盾模块启动！减免50%伤害！","cl-s")}else if(sk.type==="dmg"){var mult=sk.mult||1;var base=G.str;if(sk.stat==="wis")base=G.wis;var extra=sk.add?(sk.add==="spd"?G.spd:G.str):0;var dmg=Math.max(1,Math.floor((base*mult+extra)-c.enemy.def));c.hp-=dmg;addCombatLog("【"+sk.name+"】对"+c.enemy.name+"造成"+dmg+"伤害！","cl-s");shakeEnemy()}else if(sk.type==="debuff"){c.debuff=Math.max(c.debuff,30);addCombatLog("【入侵干扰】"+c.enemy.name+"伤害-30%！持续2回合","cl-s")}else if(sk.type==="pas"){addCombatLog("被动技能已激活："+sk.desc,"cl-s")}if(c.hp<=0){addCombatLog(c.enemy.name+"被击败！","cl-h");var xp=c.enemy.xp;G.exp+=xp;addCombatLog("获得经验值："+xp,"cl-h");checkRealmUp();endCombat(true);return}updateCombatUI();updateHUD();enemyTurn()}function openIt(){var list=G.items||[];var modal=document.getElementById("sm-ov");var listEl=document.getElementById("sk-list");listEl.innerHTML="";if(list.length===0){listEl.innerHTML="<div style=color:#555;font-size:13px;text-align:center;padding:10px>没有道具</div>"}else{list.forEach(function(item,idx){var def=IT.find(function(i){return i.id===item.id})||{};var btn=document.createElement("button");btn.className="iopt";btn.innerHTML="<span class=itname>"+def.name+" x"+item.n+"</span><div class=itdesc>"+def.desc+"</div>";btn.onclick=function(){useItem(idx)};listEl.appendChild(btn)})}document.getElementById("sm-ov").classList.add("act")}function useItem(idx){var item=G.items[idx];if(!item||item.n<=0)return;var def=IT.find(function(i){return i.id===item.id});if(!def){closeSk();return}if(def.type==="hp"){G.hp=Math.min(G.maxHP,G.hp+def.val);addCombatLog("使用"+def.name+"，恢复"+def.val+"灵质！","cl-h")}else if(def.type==="mp"){G.mp=Math.min(G.maxMP,G.mp+def.val);addCombatLog("使用"+def.name+"，恢复"+def.val+"神识！","cl-h")}else if(def.type==="full"){G.hp=G.maxHP;G.mp=G.maxMP;addCombatLog("使用"+def.name+"，完全恢复！","cl-h")}else if(def.type==="dmg"){if(G.combat){G.combat.hp-=def.val;addCombatLog("使用"+def.name+"，造成"+def.val+"伤害！","cl-d");shakeEnemy();if(G.combat.hp<=0){addCombatLog(G.combat.enemy.name+"被击败！","cl-h");G.exp+=G.combat.enemy.xp;addCombatLog("获得经验："+G.combat.enemy.xp,"cl-h");checkRealmUp();endCombat(true)}}}}item.n--;if(item.n<=0){G.items.splice(idx,1)}closeSk();updateCombatUI();updateHUD();if(G.combat)enemyTurn()}function checkRealmUp(){while(G.realm<RX.length-1&&G.exp>=RX[G.realm+1]){G.realm++;G.maxHP+=20;G.maxMP+=10;G.hp=G.maxHP;G.mp=G.maxMP;notify("境界突破！晋升为"+R[G.realm]+"！")}updateHUD()}function endCombat(won){G.combat=null;document.getElementById("comb").style.display="none";var scene=SC[G.scene];if(scene&&scene.next){setTimeout(function(){loadScene(scene.next)},800)}else{setTimeout(function(){loadScene(G.scene)},800)}}function enemyTurn(){var c=G.combat;if(!c)return;var bD=Math.floor(c.enemy.atk*(1-(c.debuff||0)*0.01));var aD=bD;if(c.shield){aD=Math.floor(aD*0.5);c.shield=false}aD=Math.max(1,Math.floor(aD-G.str*0.2));G.hp-=aD;addCombatLog(c.enemy.name+"对你造成"+aD+"点伤害！","cl-d");if(c.debuff>0)c.debuff--;shakePlayer();c.turn++;updateCombatUI();updateHUD();if(G.hp<=0){G.hp=0;playerDie()}}function shakeEnemy(){var el=document.getElementById("comb");el.classList.add("sh");setTimeout(function(){el.classList.remove("sh")},250)}function shakePlayer(){var app=document.getElementById("app");app.classList.add("flash");setTimeout(function(){app.classList.remove("flash")},450)}function playerDie(){G.combat=null;document.getElementById("comb").style.display="none";saveSeed();var mA=Math.max(G.str,G.wis,G.lu,G.spd);document.getElementById("d-msg").textContent="道源号核心震荡…意识消失无尸黑暗…
你的"+mA+"点属性将以5%的力量注入轮回。";document.getElementById("d-seed").textContent="本周目获得经验："+G.exp+" | 轮回种子：+"+Math.floor(mA*0.05)+"属性";document.getElementById("dv-ov").classList.add("act")}
function rebirth(){document.getElementById("dv-ov").classList.remove("act");var seed=getSeed();G={chapter:0,scene:"",loop:seed.weekCount+1,exp:0,maxHP:100,maxMP:50,hp:100,mp:50,str:10+Math.floor(seed.maxStr*0.05),wis:12+Math.floor(seed.maxWis*0.05),lu:8+Math.floor(seed.maxLu*0.05),spd:10+Math.floor(seed.maxSpd*0.05),realm:0,realmXP:0,skillTree:null,skillsUnlocked:[],items:[{id:"hp_pill",n:2},{id:"mp_pill",n:2}],gold:0,fragments:[],combat:null,typing:null,autoSaveSlot:0,pendingCombat:null};document.getElementById("app").style.display="flex";showChapter("\u7b2c"+(seed.weekCount+1)+"\u5468\u76ee\u8f6e\u56de","\u7075\u6e90\u91cd\u751f");loadScene("intro_1")}
function notify(m){var e=document.getElementById("notif");e.textContent=m;e.classList.add("ov");setTimeout(function(){e.classList.remove("ov")},2500)}
function showTree(){var m=document.getElementById("stmodal");if(!G.skillTree){m.innerHTML="<h3>选择功法</h3><div class=tt>从三个流派中选择一个：</div><div class=tbtns><button class=tb onclick=selectTree('\u7075\u67dc\u7cfb')>\u7075\u67dc\u7cfb</button><button class=tb onclick=selectTree('\u7075\u7f51\u7cfb')>\u7075\u7f51\u7cfb</button><button class=tb onclick=selectTree('\u5251\u4fee\u7cfb')>\u5251\u4fee\u7cfb</button></div><button class=clt onclick=closeTree()>关闭</button>"}else{var t=SK[G.skillTree];var u=G.skillsUnlocked||[];var h="<h3>"+G.skillTree+"</h3><div class=tt>已解锁："+(u.length+1)+" / 3</div><div class=tsk>";t.skills.forEach(function(sk,i){var st=i<=u.length?(i<u.length?"on":"on locked"):"locked";h+="<div class=ts "+st+">Lv."+(i+1)+" "+sk.name+" - "+sk.desc+(i>u.length+1?" [未解锁]":"")+"</div>"});h+="</div><button class=clt onclick=closeTree()>关闭</button>";m.innerHTML=h}document.getElementById("strov").classList.add("act")}
</script></body></html>
